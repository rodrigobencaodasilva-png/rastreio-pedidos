databases:
  - name: rastreio-db
    plan: free
    databaseName: rastreio
    user: rastreio
services:
  - type: web
    name: rastreio-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    dockerCommand: node dist/db/seed.js && node dist/index.js
    envVars:
      - { key: NODE_ENV, value: production }
      - { key: PORT, value: 4000 }
      - key: DATABASE_URL
        fromDatabase: { name: rastreio-db, property: connectionString }
      - { key: JWT_SECRET, generateValue: true }
      - { key: JWT_EXPIRES_IN, value: 8h }
      - { key: ADMIN_EMAIL, value: admin@empresa.com }
      - { key: ADMIN_PASSWORD, sync: false }
      - { key: NOTIFICATIONS_MODE, value: mock }
      - { key: PUBLIC_BASE_URL, sync: false }
      - { key: SMTP_HOST, sync: false }
      - { key: SMTP_PORT, value: 587 }
      - { key: SMTP_USER, sync: false }
      - { key: SMTP_PASS, sync: false }
      - { key: SMTP_FROM, value: no-reply@empresa.com }
      - { key: WHATSAPP_TOKEN, sync: false }
      - { key: WHATSAPP_PHONE_ID, sync: false }
  - type: web
    name: rastreio-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_HOST
        fromService: { type: web, name: rastreio-backend, property: host }
